<html lang="en">

    <!-- JSON-LD -->

    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "MCODE",
      "url": "https://mcode.dev",
      "description": "Email infrastructure for developers. Reliable transactional and marketing emails at scale.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "name": "Starter"
        },
        {
          "@type": "Offer",
          "price": "29",
          "priceCurrency": "USD",
          "name": "Pro",
          "billingIncrement": "month"
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "1200"
      }
    }

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
